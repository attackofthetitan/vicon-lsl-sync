name: Build Vicon LSL Bridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - "labrecorder/**"
      - "hololens-gaze-lsl/**"
      - "stream-contracts/**"
      - "tools/generate_stream_contracts.py"
      - ".github/workflows/build-bridge.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - "labrecorder/**"
      - "hololens-gaze-lsl/**"
      - "stream-contracts/**"
      - "tools/generate_stream_contracts.py"
      - ".github/workflows/build-bridge.yml"

jobs:
  logic-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        fetch_catch2: [ON, OFF]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Verify generated stream contracts
        run: python tools/generate_stream_contracts.py --check

      - name: Configure dependency-light tests
        run: cmake -S vicon-lsl-bridge -B build-logic -DVICON_LSL_BRIDGE_BUILD_RUNTIME=OFF -DVICON_LSL_BRIDGE_BUILD_GUI=OFF -DVICON_LSL_BRIDGE_FETCH_CATCH2=${{ matrix.fetch_catch2 }} -DBUILD_TESTING=ON

      - name: Build dependency-light tests
        run: cmake --build build-logic --config Release --target vicon-lsl-bridge-logic-tests

      - name: Run dependency-light tests
        run: ctest --test-dir build-logic --build-config Release --output-on-failure

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: vicon-lsl-bridge-linux-x64
          - os: windows-latest
            arch: x64
            triplet: x64-windows-static-md
            artifact: vicon-lsl-bridge-windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true

      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ matrix.triplet }}-boost-${{ hashFiles('vicon-lsl-bridge/external/vicon-datastream-sdk/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-boost-

      - name: Install Boost via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install boost-thread:${{ matrix.triplet }} boost-chrono:${{ matrix.triplet }} boost-asio:${{ matrix.triplet }} boost-filesystem:${{ matrix.triplet }} boost-format:${{ matrix.triplet }} boost-algorithm:${{ matrix.triplet }} boost-date-time:${{ matrix.triplet }} boost-math:${{ matrix.triplet }} boost-range:${{ matrix.triplet }} boost-lexical-cast:${{ matrix.triplet }}

      # Build vicon-lsl-bridge (CLI + GUI)
      - name: Configure bridge (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DBUILD_TESTING=ON
        working-directory: vicon-lsl-bridge

      - name: Configure bridge (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -A ${{ matrix.arch == 'x64' && 'x64' || 'Win32' }} "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DVICON_LSL_LABRECORDER_DEPLOY_DIR=${{ github.workspace }}/recorder-deploy -DBUILD_TESTING=ON
        working-directory: vicon-lsl-bridge
        shell: cmd

      - name: Build bridge
        run: cmake --build build --config Release
        working-directory: vicon-lsl-bridge

      - name: Test bridge
        run: ctest --test-dir build --build-config Release --output-on-failure
        working-directory: vicon-lsl-bridge

      # Build LabRecorder (skip x86)
      - name: Configure LabRecorder
        run: cmake -S labrecorder -B build-labrecorder -DCMAKE_BUILD_TYPE=Release -DLSL_FETCH_IF_MISSING=ON -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build LabRecorder
        run: cmake --build build-labrecorder --config Release --parallel

      - name: Install and deploy LabRecorder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --install build-labrecorder --config Release --prefix "$env:GITHUB_WORKSPACE\recorder-install"
          $deploy = "$env:GITHUB_WORKSPACE\recorder-deploy"
          New-Item -ItemType Directory -Force $deploy | Out-Null
          foreach ($name in @('LabRecorder.exe', 'LabRecorderCLI.exe')) {
            $source = Get-ChildItem "$env:GITHUB_WORKSPACE\recorder-install" -Recurse -File -Filter $name | Select-Object -First 1
            if (-not $source) { throw "LabRecorder install missing $name" }
            Copy-Item $source.FullName $deploy -Force
          }
          foreach ($name in @('LabRecorder.cfg', 'LICENSE')) {
            $source = Get-ChildItem "$env:GITHUB_WORKSPACE\recorder-install" -Recurse -File -Filter $name | Select-Object -First 1
            if (-not $source) { throw "LabRecorder install missing $name" }
            Copy-Item $source.FullName $deploy -Force
          }
          $lsl = Get-ChildItem -Path build-labrecorder -Recurse -File -Filter 'lsl*.dll' | Select-Object -First 1
          if (-not $lsl) { throw 'LabRecorder liblsl runtime was not built' }
          Copy-Item $lsl.FullName (Join-Path $deploy 'lsl.dll') -Force
          & windeployqt --no-translations (Join-Path $deploy 'LabRecorder.exe')
          if (-not (Test-Path (Join-Path $deploy 'platforms\qwindows.dll'))) { throw 'LabRecorder Qt deployment is missing platforms/qwindows.dll' }

      # Package everything together
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          test -f vicon-lsl-bridge/build/vicon-lsl-bridge
          test -f vicon-lsl-bridge/build/vicon-lsl-bridge-gui
          test -f build-labrecorder/LabRecorder
          test -f build-labrecorder/LabRecorderCLI
          find vicon-lsl-bridge/build/_deps/liblsl-build -name "liblsl.so*" -print -quit | grep -q .
          find build-labrecorder -name "liblsl.so*" -print -quit | grep -q .
          cp vicon-lsl-bridge/build/vicon-lsl-bridge package/
          cp vicon-lsl-bridge/build/vicon-lsl-bridge-gui package/
          # Copy liblsl shared library
          find vicon-lsl-bridge/build/_deps/liblsl-build -name "liblsl.so*" -exec cp -P {} package/ \;
          # Copy LabRecorder binaries
          cp build-labrecorder/LabRecorder package/
          cp build-labrecorder/LabRecorderCLI package/
          find build-labrecorder -name "liblsl.so*" -exec cp -P {} package/ \;
          find package -maxdepth 1 -name "liblsl.so*" -print -quit | grep -q .
          tar -czf ${{ matrix.artifact }}.tar.gz -C package .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory package, package\stair_model, package\labrecorder | Out-Null
          $bridge = 'vicon-lsl-bridge\build\Release'
          foreach ($name in @('vicon-lsl-bridge.exe', 'vicon-lsl-bridge-gui.exe')) {
            if (-not (Test-Path (Join-Path $bridge $name))) { throw "Bridge build missing $name" }
            Copy-Item (Join-Path $bridge $name) package -Force
          }
          $bridgeLsl = Get-ChildItem -Path vicon-lsl-bridge\build\_deps\liblsl-build -Recurse -File -Filter 'lsl*.dll' | Select-Object -First 1
          if (-not $bridgeLsl) { throw 'Bridge liblsl runtime was not built' }
          Copy-Item $bridgeLsl.FullName package\lsl.dll -Force
          & windeployqt --no-translations package\vicon-lsl-bridge-gui.exe
          Copy-Item vicon-lsl-bridge\assets\stair_model\* package\stair_model -Force
          Copy-Item recorder-deploy\* package\labrecorder -Recurse -Force
          $required = @(
            'package\vicon-lsl-bridge.exe', 'package\vicon-lsl-bridge-gui.exe', 'package\platforms\qwindows.dll',
            'package\stair_model\stair_model1.obj', 'package\stair_model\stair_model1.mtl',
            'package\labrecorder\LabRecorder.exe', 'package\labrecorder\LabRecorderCLI.exe',
            'package\labrecorder\LabRecorder.cfg', 'package\labrecorder\LICENSE',
            'package\labrecorder\platforms\qwindows.dll')
          foreach ($path in $required) { if (-not (Test-Path $path)) { throw "Package inventory missing $path" } }
          $packageLsl = Get-ChildItem package -File -Filter 'lsl*.dll'
          $recorderLsl = Get-ChildItem package\labrecorder -File -Filter 'lsl*.dll'
          if (-not $packageLsl -or -not $recorderLsl) { throw 'Package inventory is missing bridge or recorder lsl.dll' }
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.artifact }}.zip -Force
        shell: pwsh

      - name: Package portable GUI single exe (Windows)
        if: runner.os == 'Windows'
        run: |
          $gui = "vicon-lsl-bridge\build\Release\vicon-lsl-bridge-gui.exe"
          if (-not (Test-Path $gui)) {
            throw "GUI executable was not built: $gui"
          }
          cmake --build vicon-lsl-bridge\build --config Release --target vicon-lsl-bridge-gui-portable
          $portable = "vicon-lsl-bridge\build\vicon-lsl-bridge-gui-portable.exe"
          if (-not (Test-Path $portable)) {
            throw "Portable GUI target completed without producing: $portable"
          }
          Copy-Item $portable "${{ matrix.artifact }}-gui-portable.exe"
        shell: pwsh

      - name: Test portable GUI (Windows)
        if: runner.os == 'Windows'
        run: |
          $portable = "${{ matrix.artifact }}-gui-portable.exe"
          if (-not (Test-Path $portable)) {
            throw "Portable GUI artifact was not created: $portable"
          }
          $process = Start-Process `
            -FilePath ".\$portable" `
            -ArgumentList "--test" `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Portable GUI test failed with exit code $($process.ExitCode)."
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            ${{ matrix.artifact }}-gui-portable.exe

  hololens-core-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Verify generated stream contracts
        run: python tools/generate_stream_contracts.py --check

      - name: Run platform-neutral HoloLens tests
        run: dotnet run --project hololens-gaze-lsl/Tests/HoloLensCore.Tests.csproj --configuration Release

  release:
    needs: [logic-tests, build, hololens-core-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*
