name: Build Vicon LSL Bridge

on:
  push:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - ".github/workflows/build-bridge.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - ".github/workflows/build-bridge.yml"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: vicon-lsl-bridge-linux-x64
          - os: windows-latest
            arch: x64
            triplet: x64-windows-static
            artifact: vicon-lsl-bridge-windows-x64
          - os: windows-latest
            arch: x86
            triplet: x86-windows-static
            artifact: vicon-lsl-bridge-windows-x86
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ matrix.triplet }}-boost-${{ hashFiles('vicon-lsl-bridge/external/vicon-datastream-sdk/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-boost-

      - name: Install Boost via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install boost-thread boost-chrono boost-asio boost-filesystem boost-format boost-algorithm boost-date-time boost-math boost-range boost-lexical-cast:${{ matrix.triplet }}

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build
        working-directory: vicon-lsl-bridge

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -A ${{ matrix.arch == 'x64' && 'x64' || 'Win32' }} "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
        working-directory: vicon-lsl-bridge
        shell: cmd

      - name: Build
        run: cmake --build build --config Release
        working-directory: vicon-lsl-bridge

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/vicon-lsl-bridge package/
          tar -czf ${{ matrix.artifact }}.tar.gz -C package .
        working-directory: vicon-lsl-bridge

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package
          copy build\Release\vicon-lsl-bridge.exe package\
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.artifact }}.zip
        working-directory: vicon-lsl-bridge
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: vicon-lsl-bridge/${{ matrix.artifact }}.*

  bundle-labrecorder:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - asset_pattern: "*Windows_amd64*"
            artifact: labrecorder-windows-x64
          - asset_pattern: "*Windows_i386*"
            artifact: labrecorder-windows-x86
          - asset_pattern: "*Linux*amd64*"
            artifact: labrecorder-linux-x64

    steps:
      - name: Download latest LabRecorder release
        run: |
          gh release download --repo labstreaminglayer/App-LabRecorder --pattern '${{ matrix.asset_pattern }}' --dir labrecorder-download
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: labrecorder-download/*

  release:
    needs: [build, bundle-labrecorder]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
