name: Build Vicon LSL Bridge

on:
  push:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - "labrecorder/**"
      - ".github/workflows/build-bridge.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - "labrecorder/**"
      - ".github/workflows/build-bridge.yml"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: vicon-lsl-bridge-linux-x64
          - os: windows-latest
            arch: x64
            triplet: x64-windows-static-md
            artifact: vicon-lsl-bridge-windows-x64
          - os: windows-latest
            arch: x86
            triplet: x86-windows-static-md
            artifact: vicon-lsl-bridge-windows-x86
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true

      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ matrix.triplet }}-boost-${{ hashFiles('vicon-lsl-bridge/external/vicon-datastream-sdk/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-boost-

      - name: Install Boost via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install boost-thread:${{ matrix.triplet }} boost-chrono:${{ matrix.triplet }} boost-asio:${{ matrix.triplet }} boost-filesystem:${{ matrix.triplet }} boost-format:${{ matrix.triplet }} boost-algorithm:${{ matrix.triplet }} boost-date-time:${{ matrix.triplet }} boost-math:${{ matrix.triplet }} boost-range:${{ matrix.triplet }} boost-lexical-cast:${{ matrix.triplet }}

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build
        working-directory: vicon-lsl-bridge

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -A ${{ matrix.arch == 'x64' && 'x64' || 'Win32' }} "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
        working-directory: vicon-lsl-bridge
        shell: cmd

      - name: Build
        run: cmake --build build --config Release
        working-directory: vicon-lsl-bridge

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/vicon-lsl-bridge package/
          cp build/vicon-lsl-bridge-gui package/ || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C package .
        working-directory: vicon-lsl-bridge

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package
          copy build\Release\vicon-lsl-bridge.exe package\
          if (Test-Path build\Release\vicon-lsl-bridge-gui.exe) {
            copy build\Release\vicon-lsl-bridge-gui.exe package\
            & windeployqt package\vicon-lsl-bridge-gui.exe
          }
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.artifact }}.zip
        working-directory: vicon-lsl-bridge
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: vicon-lsl-bridge/${{ matrix.artifact }}.*

  build-labrecorder:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: labrecorder-linux-x64
          - os: windows-latest
            artifact: labrecorder-windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0

      - name: Configure CMake
        run: cmake -S labrecorder -B build-labrecorder -DCMAKE_BUILD_TYPE=Release -DLSL_FETCH_IF_MISSING=ON -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build-labrecorder --config Release --parallel

      - name: Package (CPack)
        run: cd build-labrecorder && cpack -C Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build-labrecorder/*.deb
            build-labrecorder/*.zip
            build-labrecorder/*.tar.gz

  release:
    needs: [build, build-labrecorder]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
