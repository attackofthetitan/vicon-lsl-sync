name: Build Vicon LSL Bridge

on:
  push:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - ".github/workflows/build-bridge.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "vicon-lsl-bridge/**"
      - ".github/workflows/build-bridge.yml"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vicon-lsl-bridge-linux
          - os: windows-latest
            artifact: vicon-lsl-bridge-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libboost-thread-dev libboost-chrono-dev

      - name: Install Boost (Windows)
        if: runner.os == 'Windows'
        run: choco install boost-msvc-14.3 -y

      - name: Configure CMake
        run: cmake -B build
        working-directory: vicon-lsl-bridge

      - name: Build
        run: cmake --build build --config Release
        working-directory: vicon-lsl-bridge

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/vicon-lsl-bridge package/
          tar -czf ${{ matrix.artifact }}.tar.gz -C package .
        working-directory: vicon-lsl-bridge

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package
          copy build\Release\vicon-lsl-bridge.exe package\
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.artifact }}.zip
        working-directory: vicon-lsl-bridge
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: vicon-lsl-bridge/${{ matrix.artifact }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
